<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Countdown Watch — 2045/12/21 24:00</title>
<style>
  :root {
    --accent: #4dd0e1;
    --accent2: #7b5cff;
    --text: #ffffff;
    --muted: #7a8099;
    --ring-bg: #16181f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: #000;                 /* AMOLED: 純黒で省電力 */
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Roboto",
                 "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* 丸い画面いっぱいに広がる正方形の時計面。vmin で常に画面内に収める。 */
  .watch {
    position: relative;
    width: 100vmin;
    height: 100vmin;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);        /* 12時位置から開始 */
  }
  .ring circle { fill: none; stroke-linecap: round; }
  .ring .track { stroke: var(--ring-bg); }
  .ring .prog  {
    stroke: url(#grad);
    transition: stroke-dashoffset 1s linear;
  }
  .ring.notrans .prog { transition: none; }

  /* コンテンツは内接円のセーフゾーン(直径の約68%)に収める */
  .face {
    position: absolute;
    width: 68%;
    height: 68%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 2%;
  }

  .target {
    font-size: 5.2vmin;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .days {
    font-size: 24vmin;
    font-weight: 800;
    line-height: 0.95;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .days-label {
    font-size: 5vmin;
    letter-spacing: 0.35em;
    color: var(--accent);
    margin-top: -0.4vmin;
  }

  .hms {
    font-size: 8.6vmin;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    color: #dfe4f5;
    margin-top: 1vmin;
  }

  .done {
    font-size: 9vmin;
    font-weight: 800;
    color: var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* PC/スマホ等の非円形画面でも“丸い時計”として見せる縁取り */
  @media (min-aspect-ratio: 5/4), (max-aspect-ratio: 4/5) {
    .watch::after {
      content: "";
      position: absolute;
      inset: 1.5%;
      border-radius: 50%;
      box-shadow: 0 0 0 1px #14161d, 0 0 60px rgba(77,208,225,0.08) inset;
      pointer-events: none;
    }
  }
</style>
</head>
<body>
  <div class="watch" id="watch">
    <svg class="ring" id="ring" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stop-color="#4dd0e1"/>
          <stop offset="100%" stop-color="#7b5cff"/>
        </linearGradient>
      </defs>
      <circle class="track" cx="50" cy="50" r="46" stroke-width="3"></circle>
      <circle class="prog"  cx="50" cy="50" r="46" stroke-width="3"></circle>
    </svg>

    <div class="face" id="face">
      <div class="target" id="target"></div>
      <div class="days" id="days">--</div>
      <div class="days-label">DAYS</div>
      <div class="hms" id="hms">--:--:--</div>
    </div>
  </div>

<script>
  // 「2045/12/21 24:00」= 2045/12/22 00:00:00（ローカルタイム）
  var TARGET = new Date(2045, 11, 22, 0, 0, 0, 0);

  var elDays = document.getElementById('days');
  var elHms  = document.getElementById('hms');
  var elTarget = document.getElementById('target');
  var elFace = document.getElementById('face');
  var ring = document.getElementById('ring');
  var prog = ring.querySelector('.prog');

  var C = 2 * Math.PI * 46;           // 進捗リングの円周
  prog.setAttribute('stroke-dasharray', C.toFixed(3));

  function pad(n, len) {
    var s = String(n);
    while (s.length < (len || 2)) s = '0' + s;
    return s;
  }

  elTarget.textContent = TARGET.getFullYear() + '.' +
    pad(TARGET.getMonth() + 1) + '.' + pad(TARGET.getDate());

  var prevSec = -1;

  function render() {
    var now = new Date();
    var diff = TARGET.getTime() - now.getTime();

    if (diff <= 0) {
      elFace.innerHTML = '<div class="done">TIME</div>';
      prog.setAttribute('stroke-dashoffset', '0');
      return true;
    }

    var t = Math.floor(diff / 1000);
    var days = Math.floor(t / 86400);
    var hours = Math.floor((t % 86400) / 3600);
    var minutes = Math.floor((t % 3600) / 60);
    var seconds = t % 60;

    elDays.textContent = days.toLocaleString('en-US');
    elHms.textContent = pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);

    // 外周リングは現在の「秒」を1分かけて一周（時計らしい動き）
    var frac = now.getSeconds() / 60;
    // 59→0 の折り返しはトランジションを一瞬切って逆走を防ぐ
    if (now.getSeconds() < prevSec) {
      ring.classList.add('notrans');
      void ring.offsetWidth;          // 強制リフロー
      prog.setAttribute('stroke-dashoffset', (C * (1 - frac)).toFixed(3));
      void ring.offsetWidth;
      ring.classList.remove('notrans');
    } else {
      prog.setAttribute('stroke-dashoffset', (C * (1 - frac)).toFixed(3));
    }
    prevSec = now.getSeconds();
    return false;
  }

  var timer;
  function tick() { if (render()) clearInterval(timer); }
  tick();
  timer = setInterval(tick, 1000);
</script>
</body>
</html>
