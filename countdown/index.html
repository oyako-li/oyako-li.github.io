<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カウントダウン — 2045/12/21 24:00</title>
<style>
  :root {
    --bg1: #0a0e27;
    --bg2: #1a1145;
    --accent: #7b5cff;
    --accent2: #4dd0e1;
    --text: #eef1ff;
    --muted: #9aa0c8;
    --card: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                 "Segoe UI", "Noto Sans JP", Meiryo, sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 800px at 20% -10%, #2a1a63 0%, transparent 55%),
                radial-gradient(1000px 700px at 100% 110%, #0e3a4a 0%, transparent 50%),
                linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  .wrap {
    width: 100%;
    max-width: 820px;
    text-align: center;
  }

  .eyebrow {
    letter-spacing: 0.3em;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .target {
    font-size: clamp(0.9rem, 2.6vw, 1.1rem);
    color: var(--accent2);
    font-variant-numeric: tabular-nums;
    margin-bottom: 40px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(8px, 2.5vw, 20px);
  }

  .cell {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: clamp(14px, 3vw, 28px) 6px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
  }

  .num {
    font-size: clamp(1.8rem, 9vw, 4rem);
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    background: linear-gradient(180deg, #fff, var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .label {
    margin-top: 10px;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .foot {
    margin-top: 34px;
    font-size: 0.85rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .done {
    font-size: clamp(1.6rem, 6vw, 3rem);
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Countdown</div>
    <h1>2045年12月21日 24:00 まで</h1>
    <div class="target" id="target"></div>

    <div class="grid" id="grid">
      <div class="cell"><div class="num" id="days">--</div><div class="label">DAYS</div></div>
      <div class="cell"><div class="num" id="hours">--</div><div class="label">HOURS</div></div>
      <div class="cell"><div class="num" id="minutes">--</div><div class="label">MINUTES</div></div>
      <div class="cell"><div class="num" id="seconds">--</div><div class="label">SECONDS</div></div>
    </div>

    <div class="foot" id="foot"></div>
  </div>

<script>
  // 「2045/12/21 24:00」は当日の終わり = 2045/12/22 00:00:00 と同じ。
  // ローカルタイムで解釈する。
  var TARGET = new Date(2045, 11, 22, 0, 0, 0, 0); // 月は0始まり: 11 = 12月

  var el = {
    target: document.getElementById('target'),
    grid: document.getElementById('grid'),
    days: document.getElementById('days'),
    hours: document.getElementById('hours'),
    minutes: document.getElementById('minutes'),
    seconds: document.getElementById('seconds'),
    foot: document.getElementById('foot')
  };

  function pad(n, len) {
    var s = String(n);
    while (s.length < (len || 2)) s = '0' + s;
    return s;
  }

  el.target.textContent = '目標: ' + TARGET.getFullYear() + '/' +
    pad(TARGET.getMonth() + 1) + '/' + pad(TARGET.getDate()) + ' ' +
    pad(TARGET.getHours()) + ':' + pad(TARGET.getMinutes()) + ':' + pad(TARGET.getSeconds());

  function render() {
    var now = new Date();
    var diff = TARGET.getTime() - now.getTime();

    if (diff <= 0) {
      el.grid.innerHTML = '<div class="done" style="grid-column:1/-1">🎉 その時が来ました！</div>';
      el.foot.textContent = '2045/12/21 24:00 に到達しました。';
      return true; // 停止
    }

    var sec = Math.floor(diff / 1000);
    var days = Math.floor(sec / 86400);
    var hours = Math.floor((sec % 86400) / 3600);
    var minutes = Math.floor((sec % 3600) / 60);
    var seconds = sec % 60;

    el.days.textContent = pad(days, 3);
    el.hours.textContent = pad(hours);
    el.minutes.textContent = pad(minutes);
    el.seconds.textContent = pad(seconds);

    var totalWeeks = Math.floor(days / 7);
    el.foot.textContent = '残り 約' + days.toLocaleString('ja-JP') + '日（およそ ' +
      totalWeeks.toLocaleString('ja-JP') + '週間）';
    return false;
  }

  var timer;
  function tick() {
    if (render()) {
      clearInterval(timer);
    }
  }
  tick();
  timer = setInterval(tick, 1000);
</script>
</body>
</html>
